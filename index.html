<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    color:white;
}

/* MAIN SECTION */

.home{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    position:relative;
    z-index:2;
}

.home h1{
    font-size:65px;
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }
    to{
        text-shadow:0 0 25px #ff1493;
    }
}

.home p{
    font-size:24px;
    max-width:700px;
    line-height:1.7;
}

/* MUSIC */

audio{
    position:fixed;
    bottom:10px;
    right:10px;
    z-index:999;
}

/* BUTTERFLY */

.butterfly{
    position:absolute;
    width:70px;
    animation:fly 14s linear infinite;
    z-index:1;
}

/* SPIDERMAN */

.spiderman{
    position:absolute;
    width:100px;
    animation:swing 12s linear infinite;
    z-index:1;
}

@keyframes fly{
    0%{
        transform:translateY(100vh) translateX(0);
    }

    100%{
        transform:translateY(-120vh) translateX(200px);
    }
}

@keyframes swing{
    0%{
        transform:translateY(-150px) translateX(0);
    }

    50%{
        transform:translateY(50vh) translateX(100px);
    }

    100%{
        transform:translateY(110vh) translateX(-100px);
    }
}

</style>
</head>

<body>

<!-- MUSIC -->

<audio autoplay loop controls>

<source src="music.mp3" type="audio/mp3">

</audio>

<!-- BUTTERFLIES -->

<img class="butterfly"
src="hhttps://cdn-icons-png.flaticon.com/512/616/616490.png"
style="left:5%; animation-delay:0s;">

<img class="butterfly"
src="https://cdn-icons-png.flaticon.com/512/616/616490.png"
style="left:45%; animation-delay:4s;">

<img class="butterfly"
src="https://cdn-icons-png.flaticon.com/512/2909/2909762.png"
style="left:80%; animation-delay:8s;">

<!-- SPIDERMAN -->

<img class="spiderman"
src="https://cdn-icons-png.flaticon.com/512/2909/2909762.png"
style="left:20%; animation-delay:1s;">

<img class="spiderman"
src="https://cdn-icons-png.flaticon.com/512/124/124574.png"
style="left:70%; animation-delay:6s;">

<!-- MAIN CONTENT -->

<section class="home">

<h1>🎉 Happy Birthday Madhu 🎉</h1>

<p>
You are the most beautiful part of my life 💖  
May your smile always shine like stars with love ✨
</p>

</section>

</body>
</html>
